name: zanzibar_farm_advisor
description: A Flutter app for Zanzibar farm advisory
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.1
  image_picker: ^1.1.0
  tflite_flutter: ^0.12.1
  image: ^4.5.0
  provider: ^6.1.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.5
  camera: ^0.11.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/advisor_data.json
    - assets/zanzibar_plant_vM.tflite
    - assets/zanzibar_plant_vM_labels.json
