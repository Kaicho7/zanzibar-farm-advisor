name: zanzibar_farm_advisor
description: Zanzibar Farm AI Advisor — plant disease detection and crop advisory
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # TFLite inference
  tflite_flutter: ^0.12.1

  # Image input
  image_picker: ^1.0.7
  file_picker: ^6.1.1

  # Image preprocessing
  image: ^4.1.7

  # State management
  provider: ^6.1.2

  # UI helpers
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3
  lottie: ^3.1.0

  # Utilities
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/zanzibar_plant_vM.tflite
    - assets/zanzibar_plant_vM_labels.json
    - assets/advisor_data.json
